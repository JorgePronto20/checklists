<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Dashboard</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

<script>
  // Impede acesso direto sem login
  if (localStorage.getItem("auth") !== "ok") {
    location.href = "login.html";
  }
</script>

<div class="container">
  <h2>Dashboard</h2>

  <p>Bem-vindo, <strong id="nome"></strong></p>

  <h3>Escolha o tipo de checklist</h3>

  <button onclick="location.href='checklist_abertura.html'">Checklist Abertura</button>
  <button onclick="location.href='checklist_fecho.html'">Checklist Fecho</button>
  <button onclick="location.href='checklist_haccp.html'">Checklist HACCP</button>

  <br><br>

  <button onclick="logout()" style="background:#b33">Terminar Sessão</button>
</div>

<script>
  // Mostrar nome do colaborador
  document.getElementById("nome").textContent =
    localStorage.getItem("colaborador_nome") || "";

  function logout() {
    localStorage.clear();
    location.href = "login.html";
  }
</script>

</body>
</html>
