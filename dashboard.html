<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Dashboard</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

<script>
  // Impede acesso direto sem login
  const id = localStorage.getItem("colaborador_id");
  const nome = localStorage.getItem("colaborador_nome");

  if (!id || !nome) {
    location.href = "login.html";
  }
</script>

  <div class="container">
    <h2>Dashboard</h2>

    <p>Bem-vindo, <strong id="nomeColaborador"></strong></p>

    <button onclick="location.href='checklist.html'">Abrir Checklist</button>

    <br><br>

    <button onclick="logout()">Terminar Sessão</button>
  </div>

<script>
  // Mostrar nome do colaborador
  document.getElementById("nomeColaborador").textContent =
    localStorage.getItem("colaborador_nome");

  // Logout
  function logout() {
    localStorage.removeItem("colaborador_id");
    localStorage.removeItem("colaborador_nome");
    location.href = "login.html";
  }
</script>

</body>
</html>
