<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Checklist</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

<script>
  // Impede acesso direto sem login
  const id = localStorage.getItem("colaborador_id");
  const nome = localStorage.getItem("colaborador_nome");

  if (!id || !nome) {
    location.href = "login.html";
  }
</script>

  <div class="container">
    <h2>Checklist</h2>

    <p>Colaborador: <strong id="nomeColaborador"></strong></p>

    <label><input type="checkbox" class="item"> Limpar balcão</label>
    <label><input type="checkbox" class="item"> Verificar fritadeiras</label>
    <label><input type="checkbox" class="item"> Repor bebidas</label>

    <button onclick="submeterChecklist()">Submeter</button>

    <p id="msg"></p>
  </div>

  <script src="api.js"></script>

  <script>
    // Mostrar nome do colaborador
    document.getElementById("nomeColaborador").textContent =
      localStorage.getItem("colaborador_nome");
  </script>

</body>
</html>
